<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1284, initial-scale=1.0, user-scalable=no" />
  <title>US Visa Photo — App Store Screenshot</title>
  <style>
    :root {
      --w: 1284px;
      --h: 2778px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Fixed-size canvas */
    .canvas {
      width: var(--w);
      height: var(--h);
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0a1628 0%, #0a1628 33%, #ffffff 33%, #ffffff 100%);
    }

    /* Two stacked “mobile webpage” screenshots */
    .stack {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr 1fr;
    }

    .pane {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 96px;
    }

    .frame {
      width: 100%;
      height: 100%;
      border-radius: 48px;
      overflow: hidden;
      background: #ffffff;
      box-shadow:
        0 28px 70px rgba(0, 0, 0, 0.22),
        0 2px 0 rgba(255, 255, 255, 0.12) inset;
      border: 1px solid rgba(15, 23, 42, 0.10);
    }

    .frame img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover; /* fill the frame cleanly */
      object-position: center top;
      transform: scale(1.02); /* tiny scale to avoid any edge gaps */
    }

    /* Slightly different cropping per pane for best composition */
    .pane--top .frame img { object-position: center top; }
    .pane--bottom .frame img { object-position: center top; }

    /* Subtle divider glow between panes */
    .divider {
      position: absolute;
      left: 0;
      right: 0;
      top: calc(50% - 1px);
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0, 113, 227, 0.35) 20%, rgba(255,255,255,0.7) 50%, rgba(0, 113, 227, 0.35) 80%, transparent 100%);
      opacity: 0.55;
      pointer-events: none;
    }

    /* Safety: avoid text selection / cursor in screenshot */
    * { -webkit-user-select: none; user-select: none; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="stack">
      <div class="pane pane--top">
        <div class="frame">
          <img src="./shot-hero.png" alt="Website hero section (mobile)" />
        </div>
      </div>
      <div class="pane pane--bottom">
        <div class="frame">
          <img src="./shot-demos.png" alt="Website demos section (mobile)" />
        </div>
      </div>
    </div>
    <div class="divider" aria-hidden="true"></div>
  </div>
</body>
</html>
