<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Store frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: "#0071e3",
              "brand-dark": "#0059b3",
              navy: "#0a1628",
            },
            fontFamily: {
              sans: [
                "-apple-system",
                "BlinkMacSystemFont",
                '"SF Pro Display"',
                '"Segoe UI"',
                "Roboto",
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --bg0: #0071e3;
        --bg1: #004ea8;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      #stage {
        position: relative;
        width: var(--w);
        height: var(--h);
        overflow: hidden;
        background: linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      }

      #stage::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0) 55%, rgba(0, 0, 0, 0.22) 100%);
      }

      .copy {
        position: absolute;
        left: 96px;
        right: 96px;
        top: 96px;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        display: none;
      }

      .copy .title {
        font-size: clamp(56px, 6.6vw, 86px);
        line-height: 1.02;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0 0 22px 0;
      }

      .copy .subtitle {
        font-size: clamp(30px, 3.4vw, 44px);
        line-height: 1.22;
        margin: 0;
        color: rgba(255, 255, 255, 0.86);
        max-width: 30ch;
      }

      .stack {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 220px 96px;
        box-sizing: border-box;
      }

      #stage.has-copy .stack {
        align-items: flex-start;
        padding-top: 430px;
        padding-bottom: 150px;
      }

      .glass {
        position: relative;
        width: min(100%, 1040px);
        height: min(100%, 2100px);
        border-radius: var(--radius, 70px);
        overflow: hidden;
        border: 2px solid rgba(255, 255, 255, 0.22);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .shot {
        position: absolute;
        inset: var(--pad, 26px);
        border-radius: calc(var(--radius, 70px) - 12px);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.06);
      }

      .shot img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        object-position: center top;
        transform: scale(1.01);
      }

      .frame {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: none;
      }

      .frame.enabled {
        display: block;
      }

      .frame .bezel {
        position: absolute;
        inset: 18px;
        border-radius: 64px;
        box-shadow: inset 0 0 0 10px rgba(20, 20, 20, 0.55), inset 0 0 0 12px rgba(255, 255, 255, 0.08);
      }

      .frame .notch {
        position: absolute;
        top: 28px;
        left: 50%;
        transform: translateX(-50%);
        width: 280px;
        height: 40px;
        border-radius: 20px;
        background: rgba(10, 10, 10, 0.65);
      }

      * {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="stage" style="--w: 1284px; --h: 2778px">
      <div class="copy" id="copy">
        <p class="title" id="title"></p>
        <p class="subtitle" id="subtitle"></p>
      </div>

      <div class="stack" id="stack">
        <div class="glass" id="glass">
          <div class="shot" id="shot">
            <img id="img" alt="" />
          </div>
          <div class="frame" id="frame">
            <div class="bezel"></div>
            <div class="notch"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__SHOT__ = window.__SHOT__ || null;
    </script>
    <script>
      (function () {
        const cfg = window.__SHOT__;
        if (!cfg) return;

        const stage = document.getElementById("stage");
        stage.style.setProperty("--w", cfg.width + "px");
        stage.style.setProperty("--h", cfg.height + "px");

        const showCopy = Boolean(cfg.copy?.title || cfg.copy?.subtitle);
        if (showCopy) stage.classList.add("has-copy");

        if (cfg.background?.type === "brand_gradient") {
          stage.style.setProperty("--bg0", cfg.background.top);
          stage.style.setProperty("--bg1", cfg.background.bottom);
        }

        const glass = document.getElementById("glass");
        glass.style.setProperty("--radius", (cfg.card?.radius ?? 70) + "px");
        glass.style.setProperty("--pad", (cfg.card?.padding ?? 26) + "px");

        const img = document.getElementById("img");
        img.src = cfg.assetUrl;

        const title = document.getElementById("title");
        const subtitle = document.getElementById("subtitle");
        const copy = document.getElementById("copy");
        if (showCopy) {
          title.textContent = cfg.copy.title || "";
          subtitle.textContent = cfg.copy.subtitle || "";
          copy.style.display = "block";
        }

        const frame = document.getElementById("frame");
        if (cfg.deviceFrame?.enabled) frame.classList.add("enabled");
      })();
    </script>
  </body>
</html>
